<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SocialBiz - Estadísticas</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .navbar { background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #333; }
        .container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .stat-number { font-size: 2.5em; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>SocialBiz</strong></div>
        <ul class="nav-links">
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="#">Inventario</a></li>
            <li><a href="#" class="active" style="color: #007bff;">Reportes</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Panel de Actividad</h2>
            
            <div style="margin: 30px 0;">
                <p>Usuarios activos en tu sesión local:</p>
                <div class="stat-number">1</div>
            </div>

            <hr>

            <div style="margin: 30px 0;">
                <p>Tiempo de pantalla actual:</p>
                <div id="session-time" class="stat-number">0:00</div>
                <p style="color: #666;">minutos:segundos</p>
            </div>
        </div>
    </div>

    <script>
        function updateTimer() {
            const loginTime = localStorage.getItem('loginTime');
            if (loginTime) {
                const now = Date.now();
                const totalSeconds = Math.floor((now - loginTime) / 1000);
                
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                
                // Formato MM:SS
                const displaySeconds = seconds < 10 ? "0" + seconds : seconds;
                document.getElementById('session-time').innerText = minutes + ":" + displaySeconds;
            }
        }

        // Actualizar el contador cada segundo
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
