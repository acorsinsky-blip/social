<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SocialBiz - Estadísticas</title>
    <!-- Conectado al CSS Único -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Barra de Navegación Unificada con los 8 enlaces -->
    <nav class="navbar" id="main-nav">
        <div class="logo"><strong>SocialBiz</strong></div>
        <ul class="nav-links">
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="controlstock.html">Inventario</a></li>
            <li><a href="estadisticas.html" class="active">Reportes</a></li>
            <li><a href="config.html">Config</a></li>
            <li><a href="calendariodeventos.html">Eventos</a></li>
            <li><a href="formulariodereservas.html">Publicar</a></li>
            <li><a href="historialdemovimientos.html">Historial</a></li>
            <li><a href="catalogo.html">Explorar</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Panel de Actividad</h2>
            
            <div style="margin: 30px 0;">
                <p>Usuarios activos en tu sesión local:</p>
                <!-- Estilos en línea aplicados para reemplazar las clases eliminadas del tag style -->
                <div style="font-size: 2.5em; color: #007bff; font-weight: bold;">1</div>
            </div>

            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

            <div style="margin: 30px 0;">
                <p>Tiempo de pantalla actual:</p>
                <div id="session-time" style="font-size: 2.5em; color: #007bff; font-weight: bold;">0:00</div>
                <p style="color: #666;">minutos:segundos</p>
            </div>
        </div>
    </div>

    <script>
        function updateTimer() {
            // Obtenemos el tiempo de inicio de sesión desde la memoria
            let loginTime = localStorage.getItem('loginTime');
            
            // Prevención de errores: Si no existe el registro, lo creamos ahora
            if (!loginTime) {
                loginTime = Date.now();
                localStorage.setItem('loginTime', loginTime);
            }

            const now = Date.now();
            const totalSeconds = Math.floor((now - loginTime) / 1000);
            
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            
            // Formato MM:SS
            const displaySeconds = seconds < 10 ? "0" + seconds : seconds;
            document.getElementById('session-time').innerText = minutes + ":" + displaySeconds;
        }

        // Actualizar el contador cada segundo
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
