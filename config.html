<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración - SocialBiz</title>
    <!-- Conectado al CSS Único -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Navbar común -->
    <nav class="navbar" id="main-nav">
        <div class="logo"><strong>SocialBiz</strong></div>
        <ul class="nav-links">
            <li><a href="perfil.html">Perfil</a></li>
            <li><a href="controlstock.html">Inventario</a></li>
            <li><a href="estadisticas.html">Reportes</a></li>
            <li><a href="config.html" class="active">Config</a></li>
            <li><a href="calendariodeventos.html">Eventos</a></li>
            <li><a href="formulariodereservas.html">Publicar</a></li>
            <li><a href="historialdemovimientos.html">Historial</a></li>
            <li><a href="catalogo.html">Explorar</a></li>
        </ul>
    </nav>

    <div class="container config-container">
        <!-- Sidebar de Configuración -->
        <aside class="config-sidebar">
            <ul>
                <li class="active" onclick="showTab('cuenta')">Editar Perfil</li>
                <li onclick="showTab('seguridad')">Seguridad</li>
                <li onclick="showTab('notificaciones')">Notificaciones</li>
                <li onclick="showTab('privacidad')">Privacidad</li>
                <li onclick="logout()" class="logout-item">Cerrar Sesión</li>
            </ul>
        </aside>

        <!-- Contenido de Configuración -->
        <main class="config-content">
            <!-- Sección Editar Perfil -->
            <section id="cuenta" class="tab-content">
                <h2>Editar Perfil</h2>
                
                <!-- NUEVO: Campo para subir la Foto de Perfil -->
                <div class="config-field">
                    <label>Foto de Perfil</label>
                    <input type="file" id="conf-avatar" accept="image/*" class="form-control" onchange="previewAvatar(event)">
                </div>

                <div class="config-field">
                    <label>Nombre a mostrar</label>
                    <input type="text" id="conf-username" placeholder="Ej: Alex">
                </div>
                <div class="config-field">
                    <label>Biografía</label>
                    <textarea id="conf-bio" rows="3" placeholder="Escribe algo sobre ti..."></textarea>
                </div>
                <div class="config-field">
                    <label>Correo Electrónico</label>
                    <input type="email" id="conf-email" placeholder="tu@correo.com">
                </div>
                <button class="btn" onclick="saveProfile()">Guardar Cambios</button>
            </section>

            <!-- Sección Seguridad -->
            <section id="seguridad" class="tab-content" style="display:none;">
                <h2>Seguridad</h2>
                <div class="config-field">
                    <label>Nueva Contraseña</label>
                    <input type="password" id="conf-pass1" placeholder="Mínimo 8 caracteres">
                </div>
                <div class="config-field">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="conf-pass2">
                </div>
                <button class="btn btn-warning" onclick="changePassword()">Cambiar Contraseña</button>
            </section>

            <!-- Sección Notificaciones -->
            <section id="notificaciones" class="tab-content" style="display:none;">
                <h2>Notificaciones</h2>
                <div class="config-check">
                    <input type="checkbox" checked> <label>Notificar nuevos pedidos en Stock</label>
                </div>
                <div class="config-check">
                    <input type="checkbox"> <label>Alertas de seguridad por correo</label>
                </div>
                <div class="config-check">
                    <input type="checkbox" checked> <label>Mensajes directos de seguidores</label>
                </div>
            </section>
            
            <!-- Sección Privacidad -->
            <section id="privacidad" class="tab-content" style="display:none;">
                <h2>Privacidad</h2>
                <p style="color: #666;">Configura quién puede ver tu actividad.</p>
                <div class="config-field">
                    <label>Visibilidad del perfil</label>
                    <select class="form-control">
                        <option>Público</option>
                        <option>Solo amigos</option>
                        <option>Privado</option>
                    </select>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Variable para guardar la imagen temporalmente
        let tempAvatarBase64 = "";

        // Cambiar entre pestañas
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
            document.querySelectorAll('.config-sidebar li').forEach(li => li.classList.remove('active'));
            
            document.getElementById(tabId).style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        // Cargar datos actuales al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            const data = JSON.parse(localStorage.getItem('socialBizUser'));
            if(data) {
                document.getElementById('conf-username').value = data.displayName || data.username || "";
                document.getElementById('conf-bio').value = data.bio || "";
                document.getElementById('conf-email').value = data.email || "";
                tempAvatarBase64 = data.avatar || ""; // Cargamos la foto si ya existe
            }
        });

        // NUEVO: Función para leer la imagen seleccionada
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempAvatarBase64 = e.target.result; // Convierte la imagen a texto
                };
                reader.readAsDataURL(file);
            }
        }

        // Guardar cambios de perfil
        function saveProfile() {
            const newName = document.getElementById('conf-username').value;
            const newBio = document.getElementById('conf-bio').value; 
            const newEmail = document.getElementById('conf-email').value;
            let data = JSON.parse(localStorage.getItem('socialBizUser')) || {};
            
            data.displayName = newName;
            data.bio = newBio; 
            data.email = newEmail;
            
            // Guardamos la foto
            if (tempAvatarBase64 !== "") {
                data.avatar = tempAvatarBase64;
            }
            
            localStorage.setItem('socialBizUser', JSON.stringify(data));
            alert("Perfil actualizado correctamente. ¡Ve a tu perfil para ver los cambios!");
        }

        // Cambiar contraseña
        function changePassword() {
            const pass1 = document.getElementById('conf-pass1').value;
            const pass2 = document.getElementById('conf-pass2').value;
            
            if(pass1 === "" || pass2 === "") {
                alert("Completa ambos campos.");
                return;
            }
            if(pass1 !== pass2) {
                alert("Las contraseñas no coinciden.");
                return;
            }
            
            let data = JSON.parse(localStorage.getItem('socialBizUser')) || {};
            data.password = pass1;
            localStorage.setItem('socialBizUser', JSON.stringify(data));
            alert("Contraseña cambiada con éxito.");
            document.getElementById('conf-pass1').value = "";
            document.getElementById('conf-pass2').value = "";
        }

        // Función para Cerrar Sesión
        function logout() {
            localStorage.removeItem('sessionActive');
            window.location.href = 'perfil.html';
        }
    </script>
</body>
</html>
