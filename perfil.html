<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SocialBiz - Mi Perfil</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; }
        .navbar { display: none; background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); justify-content: space-between; align-items: center; }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        
        /* NUEVO: Estilo del Menú Lateral */
        .side-menu {
            position: fixed;
            right: 20px;
            top: 80px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none; /* Se mostrará solo al loguearse */
            flex-direction: column;
            gap: 15px;
        }
        .side-menu a { text-decoration: none; color: #007bff; font-weight: bold; }

        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .auth-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #007bff; color: white; }
        .btn-success { background: #28a745; }
        .profile-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 50px auto; }
    </style>
</head>
<body>

    <nav class="navbar" id="main-nav">
        <div class="logo"><strong>SocialBiz</strong></div>
        <ul class="nav-links">
            <li><button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer;">Salir</button></li>
        </ul>
    </nav>

    <div id="side-menu" class="side-menu">
        <a href="perfil.html">👤 Perfil</a>
        <a href="controlstock.html">📦 Inventario</a>
        <a href="estadisticas.html">📊 Estadísticas</a>
        <a href="config.html">⚙️ Configuración</a>
    </div>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <div id="login-form">
                <h2>Iniciar Sesión</h2>
                <form onsubmit="login(event)">
                    <input type="text" id="l-user" placeholder="Usuario" required>
                    <input type="password" id="l-pass" placeholder="Contraseña" required>
                    <button type="submit" class="btn">Entrar</button>
                </form>
                <p>¿No tienes cuenta? <a href="javascript:void(0)" onclick="toggleAuth()">Regístrate</a></p>
            </div>
            <div id="register-form" style="display: none;">
                <h2>Crear Cuenta</h2>
                <form onsubmit="register(event)">
                    <input type="text" id="r-user" placeholder="Nombre de usuario" required>
                    <input type="email" id="r-email" placeholder="Correo electrónico" required>
                    <input type="password" id="r-pass" placeholder="Contraseña" required>
                    <button type="submit" class="btn btn-success">Registrarme Ahora</button>
                </form>
            </div>
        </div>
    </div>

    <div id="profile-screen" style="display: none;">
        <div class="profile-card">
            <div style="height: 100px; background: linear-gradient(90deg, #007bff, #00c6ff);"></div>
            <div style="padding: 20px; text-align: center;">
                <h1 id="p-name">Nombre</h1>
            </div>
        </div>
    </div>

    <script>
        // ... (tus funciones de toggleAuth, register, login, logout se mantienen) ...

        function init() {
            const session = localStorage.getItem('sessionActive');
            const user = JSON.parse(localStorage.getItem('socialBizUser'));
            
            if (session === 'true' && user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('profile-screen').style.display = 'block';
                document.getElementById('main-nav').style.display = 'flex';
                // Mostramos el menú lateral al iniciar sesión
                document.getElementById('side-menu').style.display = 'flex'; 
                
                document.getElementById('p-name').innerText = user.username;
            }
        }
        window.onload = init;
    </script>
</body>
</html>
